# Dispara em:
#   - push de uma tag v*.*.* (release normal)
#   - workflow_dispatch com tag manual (re-release ou hotfix)
#
# O que faz:
#   1. Builda o CLI (bun run build)
#   2. Gera o tarball npm (npm pack â†’ studiocodeai-lyacode-X.Y.Z.tgz)
#   3. Builda o instalador Windows (.exe via iexpress + .zip portable)
#   4. Publica GitHub Release no repo PÃšBLICO lyacode-installers
#      com os artefatos de instalaÃ§Ã£o (sem cÃ³digo-fonte)
#
# Secrets necessÃ¡rios (configurar em Settings â†’ Secrets â†’ Actions):
#   INSTALLERS_REPO_TOKEN  â€” PAT com acesso de escrita ao repo lyacode-installers
#                            (Contents: Read & write | repo: StudioCodeAI/lyacode-installers)
# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag para o release (ex: v1.0.1)'
        required: true
        type: string

permissions:
  contents: read   # leitura do repo privado (checkout)

jobs:
  build-and-release:
    name: Build + Release (Windows)
    runs-on: windows-latest

    steps:
      # â”€â”€ 1. Checkout â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Checkout cÃ³digo-fonte
        uses: actions/checkout@v4

      # â”€â”€ 2. Runtime â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # â”€â”€ 3. DependÃªncias â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Instalar dependÃªncias (bun install --frozen-lockfile)
        run: bun install --frozen-lockfile

      # â”€â”€ 4. Build CLI â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Build CLI (bun run build â†’ dist/cli.mjs)
        run: bun run build

      # â”€â”€ 5. Tarball npm â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Gerar tarball npm (npm pack)
        run: npm pack

      # â”€â”€ 6. Instalador Windows â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Build instalador Windows (.exe + .zip portable)
        run: bun run build:installer:windows

      # â”€â”€ 7. Detectar versÃ£o â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Detectar versÃ£o do package.json
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          echo "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Versao detectada: $version"

      # â”€â”€ 8. Upload artefatos no workflow (cache interno) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Upload artefatos do build
        uses: actions/upload-artifact@v4
        with:
          name: lyacode-release-${{ steps.version.outputs.version }}
          path: |
            dist/installer/*
            studiocodeai-lyacode-*.tgz

      # â”€â”€ 9. Publicar Release no repo PÃšBLICO de instaladores â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      #
      # O cÃ³digo-fonte fica PRIVADO neste repo.
      # Os instaladores sÃ£o publicados em StudioCodeAI/lyacode-installers.
      # Token: PAT com Contents R/W no repo lyacode-installers (secret INSTALLERS_REPO_TOKEN).
      - name: Publicar Release em lyacode-installers (repo pÃºblico)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Lya Code v${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          repository: StudioCodeAI/lyacode-installers
          token: ${{ secrets.INSTALLERS_REPO_TOKEN }}
          generate_release_notes: false
          fail_on_unmatched_files: false
          files: |
            dist/installer/lyacode-setup-x64-*.exe
            dist/installer/lyacode-portable-*.zip
            studiocodeai-lyacode-*.tgz
          body: |
            ## Lya Code v${{ steps.version.outputs.version }}

            Terminal agÃªntico do **Studio CodeAI** para workflows de cÃ³digo local e em nuvem.

            ---

            ### âš¡ InstalaÃ§Ã£o â€” Multi-plataforma via npm (recomendado)

            ```bash
            npm install -g https://github.com/StudioCodeAI/lyacode-installers/releases/download/${{ github.ref_name }}/studiocodeai-lyacode-${{ steps.version.outputs.version }}.tgz
            ```

            ### ðŸªŸ Windows â€” Portable .zip

            ```powershell
            irm https://github.com/StudioCodeAI/lyacode-installers/releases/download/${{ github.ref_name }}/lyacode-portable-${{ steps.version.outputs.version }}.zip -OutFile lyacode-portable.zip
            Expand-Archive lyacode-portable.zip -DestinationPath .\lyacode-portable -Force
            cd lyacode-portable
            .\install.cmd
            ```

            ### ðŸªŸ Windows â€” Instalador .exe (se disponÃ­vel)

            ```powershell
            irm https://github.com/StudioCodeAI/lyacode-installers/releases/download/${{ github.ref_name }}/lyacode-setup-x64-${{ steps.version.outputs.version }}.exe -OutFile lyacode-setup.exe
            .\lyacode-setup.exe
            ```

            ### âœ… Validar instalaÃ§Ã£o

            ```bash
            lya --version        # â†’ ${{ steps.version.outputs.version }} (Lya Code)
            lya                  # inicia o CLI
            /provider            # configura provedor (Ollama 1Âº se estiver rodando)
            /lya                 # invoca a persona Lya
            /help                # todos os comandos
            ```

            ### ðŸ—‘ï¸ Desinstalar

            ```bash
            npm uninstall -g @studiocodeai/lyacode
            ```

