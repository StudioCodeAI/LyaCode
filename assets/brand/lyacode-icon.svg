      <stop offset="0" stop-color="#203247"/>
      <stop offset="0.55" stop-color="#101827"/>
      <stop offset="1" stop-color="#070b12"/>
    </radialGradient>
    <linearGradient id="card" x1="132" y1="80" x2="900" y2="944" gradientUnits="userSpaceOnUse">
