<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lya Cloud thinking">
  <defs>
    <radialGradient id="bg" cx="50%" cy="46%" r="72%">
      <stop offset="0" stop-color="#10243a"/>
      <stop offset="1" stop-color="#04101f"/>
    </radialGradient>
    <linearGradient id="cyan" x1="12" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f0fdff"/>
      <stop offset="1" stop-color="#78e3f6"/>
    </linearGradient>
    <linearGradient id="gold" x1="18" y1="18" x2="47" y2="47" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff6cf"/>
      <stop offset="0.55" stop-color="#d9ad4a"/>
      <stop offset="1" stop-color="#ffe28e"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.56 0 0 0 0 0.95 0 0 0 0 1 0 0 0 0.72 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <style>
      @keyframes thinkPulse {
        0%, 100% { opacity: .72; transform: scale(.96); }
        45% { opacity: 1; transform: scale(1.04); }
      }
      @keyframes thinkOrbit {
        to { transform: rotate(360deg); }
      }
      @keyframes thinkGlow {
        0%, 100% { opacity: .74; }
        50% { opacity: 1; }
      }
      .pulse { animation: thinkPulse 1.8s ease-in-out infinite; transform-origin: 32px 32px; }
      .orbit { animation: thinkOrbit 2.9s linear infinite; transform-origin: 32px 32px; }
      .core { animation: thinkGlow 1.15s ease-in-out infinite; }
      @media (prefers-reduced-motion: reduce) {
        .pulse, .orbit, .core { animation: none; }
      }
    </style>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <g class="pulse" filter="url(#glow)">
    <circle cx="32" cy="32" r="20" fill="none" stroke="url(#cyan)" stroke-width="4.8" stroke-linecap="round" stroke-dasharray="101 25"/>
  </g>
  <g class="orbit">
    <circle cx="46" cy="16" r="3.7" fill="#d9fbff" stroke="#f7feff" stroke-width="1.1"/>
  </g>
  <g class="core">
    <ellipse cx="32" cy="33" rx="13" ry="4.8" fill="none" stroke="url(#gold)" stroke-width="2.6"/>
    <ellipse cx="32" cy="33" rx="13" ry="4.8" fill="none" stroke="url(#gold)" stroke-width="2.6" transform="rotate(55 32 33)"/>
    <ellipse cx="32" cy="33" rx="13" ry="4.8" fill="none" stroke="url(#gold)" stroke-width="2.6" transform="rotate(125 32 33)"/>
    <circle cx="32" cy="33" r="4.4" fill="url(#gold)" stroke="#fff2bd" stroke-width="1.2"/>
    <circle cx="30.7" cy="31.6" r="1.4" fill="#fff8cf"/>
  </g>
</svg>
